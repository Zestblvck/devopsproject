version: "3.8"
services:
  db:
    image: mysql:8.0
    restart: always
    ports:

      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    networks:
      - app-network

  etherpad:
    image: etherpad/etherpad
    ports:
      - "${ETHERPAD_PORT}:9001"
    environment:
      AUTHENTICATION_METHOD: "apikey"
    volumes:
      - ./api/APIKEY.txt:/opt/etherpad-lite/APIKEY.txt:ro
    networks:
      - app-network

  mail:
    image: bytemark/smtp
    restart: always
    ports:
      - "2525:25"
    networks:
      - app-network

  backend:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: always
    ports:
      - "${BACK_PORT}:8080"
    environment:
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:mysql://db:3306/${DB_NAME}?useUnicode=true&serverTimezone=Europe/Paris
      - QUARKUS_DATASOURCE_USERNAME=${DB_USER}
      - QUARKUS_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - QUARKUS_MAILER_HOST=mail
      - DOODLE_INTERNALPADURL=${INTERNAL_PAD_URL}
      - DOODLE_EXTERNALPADURL=${EXTERNAL_PAD_URL}
    depends_on:
      - db
    networks:
      - app-network

  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    ports:
      - "${FRONT_PORT}:80"
    environment:
      - BACKEND_URL=${BACKEND_URL}
    depends_on:

      - backend
    networks:
      - app-network

  pumba:
    image: ghcr.io/alexei-led/pumba:latest
    container_name: pumba
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    # Pour simuler le crash du backend (Option 1) :
    # command: --interval=${CHAOS_INTERVAL} kill "re2:^doodlestudent-backend"
    # Pour simuler la latence :
    command: netem --duration 1h delay --time ${LATENCY_TIME} "re2:^doodlestudent-backend"

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    volumes:
      - uptime-kuma-data:/app/data
    ports:
      - "3001:3001"
    restart: always
    networks:
      - app-network

networks:

  app-network:
    driver: bridge

volumes:
  uptime-kuma-data:
